<div class="login-container">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
    <h1>OdontoSoft</h1>
    <p class="subtitle">Ingrese sus credenciales</p>

    <div class="campo">
      <label for="email">Correo electrónico</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="usuario@odontosoft.com"
        autocomplete="username"
      />
      @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
        <span class="error-campo">Ingrese un correo válido</span>
      }
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <div class="password-wrapper">
        <input
          id="password"
          [type]="mostrarPassword() ? 'text' : 'password'"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        <button
          type="button"
          class="toggle-password"
          (click)="togglePassword()"
          [attr.aria-label]="mostrarPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          {{ mostrarPassword() ? '🙈' : '👁️' }}
        </button>
      </div>
      @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
        <span class="error-campo">La contraseña es obligatoria</span>
      }
    </div>

    @if (errorMensaje()) {
      <div class="error-general">{{ errorMensaje() }}</div>
    }

    <button type="submit" class="btn-submit" [disabled]="cargando()">
      {{ cargando() ? 'Ingresando...' : 'Ingresar' }}
    </button>
  </form>
</div>
