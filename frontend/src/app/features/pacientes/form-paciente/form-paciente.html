<div class="contenedor">
  <h1>{{ modoEdicion() ? 'Editar paciente' : 'Nuevo paciente' }}</h1>

  @if (cargando()) {
    <p class="estado-info">Cargando...</p>
  }

  @if (!cargando()) {
    <form [formGroup]="pacienteForm" (ngSubmit)="onSubmit()">
      <div class="fila">
        <div class="campo">
          <label for="nombre">Nombre *</label>
          <input id="nombre" type="text" formControlName="nombre" />
        </div>
        <div class="campo">
          <label for="apellido">Apellido *</label>
          <input id="apellido" type="text" formControlName="apellido" />
        </div>
      </div>

      <div class="fila">
        <div class="campo">
          <label for="tipoDocumento">Tipo de documento *</label>
          <select id="tipoDocumento" formControlName="tipoDocumento">
            <option value="CC">Cédula de ciudadanía</option>
            <option value="TI">Tarjeta de identidad</option>
            <option value="CE">Cédula de extranjería</option>
            <option value="PA">Pasaporte</option>
            <option value="RC">Registro civil</option>
          </select>
        </div>
        <div class="campo">
          <label for="numeroDocumento">Número de documento *</label>
          <input id="numeroDocumento" type="text" formControlName="numeroDocumento" />
        </div>
      </div>

      <div class="fila">
        <div class="campo">
          <label for="fechaNacimiento">Fecha de nacimiento *</label>
          <input id="fechaNacimiento" type="date" formControlName="fechaNacimiento" />
        </div>
        <div class="campo">
          <label for="sexo">Sexo *</label>
          <select id="sexo" formControlName="sexo">
            <option value="M">Masculino</option>
            <option value="F">Femenino</option>
            <option value="OTRO">Otro</option>
          </select>
        </div>
      </div>

      <div class="fila">
        <div class="campo">
          <label for="telefono">Teléfono *</label>
          <input id="telefono" type="text" formControlName="telefono" />
        </div>
        <div class="campo">
          <label for="email">Email</label>
          <input id="email" type="email" formControlName="email" />
        </div>
      </div>

      <div class="fila">
        <div class="campo">
          <label for="direccion">Dirección</label>
          <input id="direccion" type="text" formControlName="direccion" />
        </div>
        <div class="campo">
          <label for="ciudad">Ciudad</label>
          <input id="ciudad" type="text" formControlName="ciudad" />
        </div>
      </div>

      <div class="fila">
        <div class="campo">
          <label for="eps">EPS</label>
          <input id="eps" type="text" formControlName="eps" />
        </div>
        <div class="campo">
          <label for="grupoSanguineo">Grupo sanguíneo</label>
          <select id="grupoSanguineo" formControlName="grupoSanguineo">
            <option value="NO_REGISTRA">No registra</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
          </select>
        </div>
      </div>

      <div class="campo campo-ancho">
        <label for="alergias">Alergias</label>
        <textarea id="alergias" formControlName="alergias" rows="2"></textarea>
      </div>

      <div class="campo campo-ancho">
        <label for="observaciones">Observaciones</label>
        <textarea id="observaciones" formControlName="observaciones" rows="2"></textarea>
      </div>

      @if (error()) {
        <div class="estado-error">{{ error() }}</div>
      }

      <div class="acciones">
        <button type="button" class="btn-secundario" (click)="cancelar()">Cancelar</button>
        <button type="submit" class="btn-primario" [disabled]="guardando()">
          {{ guardando() ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </form>
  }
</div>
